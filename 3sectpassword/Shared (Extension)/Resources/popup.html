<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <style>
        body { width: 250px; font-family: -apple-system, sans-serif; padding: 10px; margin: 0; background: #fff;}
        h3 { margin-top: 0; font-size: 14px; color: #333; border-bottom: 1px solid #eee; padding-bottom: 5px;}
        .domain-block { background: #f5f5f7; padding: 8px; margin-bottom: 8px; border-radius: 6px; font-size: 13px;}
        .domain-title { font-weight: bold; margin-bottom: 4px; color: #007aff; }
        .field-row { color: #555; }
        .btn-clear { background: #ff3b30; color: white; border: none; border-radius: 4px; cursor: pointer; padding: 4px 8px; font-size: 11px; margin-top: 5px; width: 100%;}
        .btn-clear:hover { background: #d32f2f; }
        .btn-clear-all { background: #333; color: white; border: none; border-radius: 6px; cursor: pointer; padding: 8px; width: 100%; margin-top: 10px; font-weight: bold;}
        #status { font-size: 13px; color: #666; text-align: center; }
    </style>
</head>
<body>
    <h3>ניהול מידע שמור (כל האתרים)</h3>
    <div id="dataList">
        <div id="status">טוען...</div>
    </div>
    <button id="clearAllBtn" class="btn-clear-all" style="display: none;">מחק את כל הנתונים</button>
    <script src="popup.js"></script>
</body>
</html>
